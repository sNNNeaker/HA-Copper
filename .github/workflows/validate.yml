name: Validate

on:
  push:
  pull_request:
  schedule:
    # Re-run weekly so upstream hassfest/HACS rule changes are caught even
    # when the repo is idle.
    - cron: "0 6 * * 1"
  workflow_dispatch:

# Supply-chain policy: general-purpose actions are pinned to commit SHAs
# (tag comments alongside). The two VALIDATOR actions below stay on branch
# refs on purpose — they are rule-checkers meant to track Home Assistant's
# current requirements (that's also why the weekly cron exists); freezing
# them to a SHA would validate against stale rules.

# Least privilege: every job only reads the repo, so the GITHUB_TOKEN gets
# read-only access instead of GitHub's broader default permission set.
permissions:
  contents: read

jobs:
  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: hacs/action@main
        with:
          category: integration
          # "brands" only applies to integrations shipped in HA core / listed in
          # the home-assistant/brands repo. This is an unofficial custom repo, so
          # that check can't pass and is not required for HACS installation.
          ignore: brands

  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      # const.py/api.py are HA-free by design, so the unit tests need only
      # pytest + requests — no Home Assistant install (see tests/conftest.py).
      - run: pip install pytest requests
      - run: pytest tests/ -v
