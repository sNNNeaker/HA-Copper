name: Validate

on:
  push:
  pull_request:
  schedule:
    # Re-run weekly so upstream hassfest/HACS rule changes are caught even
    # when the repo is idle.
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  hassfest:
    name: Home Assistant hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # "brands" only applies to integrations shipped in HA core / listed in
          # the home-assistant/brands repo. This is an unofficial custom repo, so
          # that check can't pass and is not required for HACS installation.
          ignore: brands
